<script>
  let pc = null;
  let dc = null;
  let audioEl = null;
  let localStream = null;
  let currentScenario = null;

  const transcript = document.getElementById("transcript");
  const statusText = document.getElementById("statusText");
  const statusDot = document.getElementById("statusDot");
  const reviewSection = document.getElementById("reviewSection");

  function setStatus(mode) {
    statusDot.className = "dot";
    if (mode === "live") {
      statusDot.classList.add("live");
      statusText.textContent = "Live";
    } else if (mode === "failed") {
      statusText.textContent = "Failed";
    } else {
      statusText.textContent = "Idle";
    }
  }

  function addLine(type, text) {
    const div = document.createElement("div");
    div.className = `line ${type}`;
    div.textContent = text;
    transcript.appendChild(div);
    transcript.scrollTop = transcript.scrollHeight;
  }

  function randomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function buildLocalScenario() {
    const leadType = document.getElementById("leadType").value;
    currentScenario = {
      leadType,
      disc: randomItem(["D","I","S","C"]),
      frustration: randomItem(["Low","Medium","High"]),
      motivation: randomItem(["Low","Medium","High"]),
      mood: randomItem(["Calm","Skeptical","Defensive","Frustrated"]),
      trustStart: 3,
      trustEnd: 6,
      defensiveStart: 7,
      defensiveEnd: 5,
      opennessStart: 2,
      opennessEnd: 5
    };
  }

  function showReview() {
    if (!currentScenario) return;
    reviewSection.classList.add("show");

    const scorecards = [
      ["Opening", "7/10"],
      ["Rapport", "6/10"],
      ["Control", "7/10"],
      ["Objection Handling", "6/10"],
      ["Appointment Setting", "5/10"],
      ["DISC Adaptation", "6/10"]
    ];

    document.getElementById("scorecards").innerHTML = scorecards
      .map(([k, v]) => `<div>${k}: <strong>${v}</strong></div>`)
      .join("");

    document.getElementById("blindReveal").innerHTML = `
      Lead Type: <strong>${currentScenario.leadType}</strong><br>
      DISC: <strong>${currentScenario.disc}</strong><br>
      Frustration: <strong>${currentScenario.frustration}</strong><br>
      Motivation: <strong>${currentScenario.motivation}</strong><br>
      Mood: <strong>${currentScenario.mood}</strong>
    `;

    document.getElementById("stateChanges").innerHTML = `
      Trust: <strong>${currentScenario.trustStart} → ${currentScenario.trustEnd}</strong><br>
      Defensiveness: <strong>${currentScenario.defensiveStart} → ${currentScenario.defensiveEnd}</strong><br>
      Openness: <strong>${currentScenario.opennessStart} → ${currentScenario.opennessEnd}</strong>
    `;
  }

  async function startSession() {
    reviewSection.classList.remove("show");
    buildLocalScenario();
    setStatus("live");
    addLine("system", "Requesting microphone and creating realtime session...");

    const backendUrl = document.getElementById("backendUrl").value.trim();
    const payload = {
      leadType: document.getElementById("leadType").value,
      difficulty: document.getElementById("difficulty").value,
      mode: document.getElementById("mode").value,
      voice: "cedar"
    };

    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

      const sessionResp = await fetch(`${backendUrl}/session`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const sessionData = await sessionResp.json();
      if (!sessionResp.ok) {
        console.error(sessionData);
        throw new Error("Failed to create realtime session.");
      }

      const ephemeralKey = sessionData.client_secret?.value;
      if (!ephemeralKey) {
        console.error(sessionData);
        throw new Error("No client secret returned.");
      }

      pc = new RTCPeerConnection();

      audioEl = document.createElement("audio");
      audioEl.autoplay = true;
      pc.ontrack = (e) => {
        audioEl.srcObject = e.streams[0];
      };

      localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
      });

      dc = pc.createDataChannel("oai-events");

      dc.onopen = () => {
        addLine("system", "Realtime voice connected.");
      };

      dc.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);

          if (msg.type === "response.audio_transcript.done" && msg.transcript) {
            addLine("ai", msg.transcript);
          }

          if (msg.type === "conversation.item.input_audio_transcription.completed" && msg.transcript) {
            addLine("user", msg.transcript);

            const lower = msg.transcript.toLowerCase();
            if (lower.includes("saber score") || lower.includes("saber end")) {
              showReview();
            }
          }

          if (msg.type === "error") {
            addLine("coach", `Error: ${JSON.stringify(msg.error)}`);
          }
        } catch (err) {
          console.error(err);
        }
      };

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const model = "gpt-4o-realtime-preview";
      const sdpResp = await fetch(`https://api.openai.com/v1/realtime?model=${model}`, {
        method: "POST",
        body: offer.sdp,
        headers: {
          Authorization: `Bearer ${ephemeralKey}`,
          "Content-Type": "application/sdp"
        }
      });

      const answerSdp = await sdpResp.text();
      await pc.setRemoteDescription({
        type: "answer",
        sdp: answerSdp
      });

      addLine("system", "Seller should respond first.");
    } catch (err) {
      console.error(err);
      setStatus("failed");
      addLine("coach", err.message || "Could not start realtime session.");
    }
  }

  async function endSession() {
    try {
      if (dc) {
        dc.close();
        dc = null;
      }
      if (pc) {
        pc.close();
        pc = null;
      }
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
    } catch (err) {
      console.error(err);
    }

    setStatus("idle");
    addLine("system", "Session ended.");
    showReview();
  }

  function sendCommand(text) {
    if (!dc || dc.readyState !== "open") {
      addLine("coach", "No live realtime channel.");
      return;
    }

    dc.send(JSON.stringify({
      type: "conversation.item.create",
      item: {
        type: "message",
        role: "user",
        content: [
          { type: "input_text", text }
        ]
      }
    }));

    dc.send(JSON.stringify({
      type: "response.create"
    }));

    addLine("user", `[command] ${text}`);
  }

  document.getElementById("startBtn").addEventListener("click", startSession);
  document.getElementById("endBtn").addEventListener("click", endSession);

  document.getElementById("pauseBtn").addEventListener("click", () => sendCommand("Saber pause"));
  document.getElementById("coachBtn").addEventListener("click", () => sendCommand("Saber coach"));
  document.getElementById("resumeBtn").addEventListener("click", () => sendCommand("Saber resume"));
  document.getElementById("scoreBtn").addEventListener("click", () => sendCommand("Saber score"));

  document.getElementById("replayBtn").addEventListener("click", () => {
    addLine("system", "Replaying same seller.");
    reviewSection.classList.remove("show");
    setStatus("idle");
  });

  document.getElementById("newBtn").addEventListener("click", () => {
    addLine("system", "Generating new random seller.");
    reviewSection.classList.remove("show");
    buildLocalScenario();
    setStatus("idle");
  });
</script>
