<script>
  let pc = null;
  let dc = null;
  let localStream = null;
  let currentScenario = null;
  let sellerName = "Seller";
  let phoneAnswer = "Hello?";
  let sessionLive = false;
  let sessionStarting = false;
  let sellerHasSpokenFirst = false;
  let awaitingSellerOpening = false;
  let audioContext = null;

  const CALL_STATES = {
    IDLE: "idle",
    STARTING: "starting",
    RINGING: "ringing",
    CONNECTING: "connecting",
    READY_TO_ANSWER: "ready_to_answer",
    SELLER_TURN: "seller_turn",
    USER_TURN: "user_turn",
    ENDED: "ended",
    FAILED: "failed"
  };

  let callState = CALL_STATES.IDLE;

  const transcript = document.getElementById("transcript");
  const statusText = document.getElementById("statusText");
  const statusDot = document.getElementById("statusDot");
  const reviewSection = document.getElementById("reviewSection");
  const remoteAudio = document.getElementById("remoteAudio");

  const liveState = {
    trust: 3,
    defensiveness: 5,
    openness: 3,
    appointmentReadiness: 1,
    objectiveProgress: 0,
    startTrust: 3,
    startDefensiveness: 5,
    startOpenness: 3,
    startAppointmentReadiness: 1
  };

  function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
  }

  function wait(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  function setStatus(mode, textOverride = "") {
    statusDot.className = "dot";

    if (mode === "live") statusDot.classList.add("live");
    if (mode === "failed") statusDot.classList.add("failed");

    if (textOverride) {
      statusText.textContent = textOverride;
      return;
    }

    statusText.textContent =
      mode === "live" ? "Live" :
      mode === "failed" ? "Failed" :
      "Idle";
  }

  function addLine(type, text) {
    const div = document.createElement("div");
    div.className = "line " + type;
    div.textContent = text;
    transcript.appendChild(div);
    transcript.scrollTop = transcript.scrollHeight;
  }

  function resetTranscript() {
    transcript.innerHTML = "";
    addLine("system", "Press Start Voice Session and allow microphone access.");
  }

  function randomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function buildLocalScenario() {
    const leadType = document.getElementById("leadType").value;
    const objective = document.getElementById("objectiveType").value;
    const difficulty = document.getElementById("difficulty").value;

    currentScenario = {
      leadType,
      objective,
      disc: randomItem(["D", "I", "S", "C"]),
      frustration: randomItem(["Low", "Medium", "High"]),
      motivation: randomItem(["Low", "Medium", "High"]),
      mood: randomItem(["Calm", "Skeptical", "Defensive", "Frustrated"])
    };

    liveState.trust = difficulty === "Easy" ? 4 : difficulty === "Expert" ? 1 : 3;
    liveState.defensiveness = difficulty === "Easy" ? 3 : difficulty === "Expert" ? 8 : 5;
    liveState.openness = 3;
    liveState.appointmentReadiness =
      objective === "Set Appointment" || objective === "Confirm Appointment" ? 3 : 1;
    liveState.objectiveProgress = 0;

    liveState.startTrust = liveState.trust;
    liveState.startDefensiveness = liveState.defensiveness;
    liveState.startOpenness = liveState.openness;
    liveState.startAppointmentReadiness = liveState.appointmentReadiness;

    document.getElementById("liveObjectiveText").textContent = `${objective} — ${leadType}`;
    updateLivePanel();
  }

  function updateMetric(idPrefix, value, max, deltaText) {
    document.getElementById(idPrefix + "Value").textContent =
      idPrefix === "objective" ? `${value}%` : `${value}/${max}`;

    const width = idPrefix === "objective" ? value : (value / max) * 100;
    document.getElementById(idPrefix + "Bar").style.width = `${width}%`;
    document.getElementById(idPrefix + "Delta").textContent = deltaText;
  }

  function updateLivePanel() {
    updateMetric("trust", liveState.trust, 10, liveState.trust >= 7 ? "Strong rapport" : liveState.trust >= 4 ? "Building" : "Fragile");
    updateMetric("defensive", liveState.defensiveness, 10, liveState.defensiveness >= 7 ? "High resistance" : liveState.defensiveness >= 4 ? "Guarded" : "Relaxed");
    updateMetric("open", liveState.openness, 10, liveState.openness >= 7 ? "Seller is revealing more" : liveState.openness >= 4 ? "Some openness" : "Closed off");
    updateMetric("appointment", liveState.appointmentReadiness, 10, liveState.appointmentReadiness >= 7 ? "Strong close window" : liveState.appointmentReadiness >= 4 ? "Possible if handled well" : "Too early");
    updateMetric("objective", liveState.objectiveProgress, 100, liveState.objectiveProgress >= 70 ? "Objective advancing well" : liveState.objectiveProgress >= 40 ? "Partial progress" : "Needs work");
  }

  function applyStateChange(changes) {
    if (typeof changes.trust === "number") liveState.trust = clamp(liveState.trust + changes.trust, 1, 10);
    if (typeof changes.defensiveness === "number") liveState.defensiveness = clamp(liveState.defensiveness + changes.defensiveness, 1, 10);
    if (typeof changes.openness === "number") liveState.openness = clamp(liveState.openness + changes.openness, 1, 10);
    if (typeof changes.appointmentReadiness === "number") liveState.appointmentReadiness = clamp(liveState.appointmentReadiness + changes.appointmentReadiness, 1, 10);
    if (typeof changes.objectiveProgress === "number") liveState.objectiveProgress = clamp(liveState.objectiveProgress + changes.objectiveProgress, 0, 100);
    updateLivePanel();
  }

  function analyzeUserTurn(text) {
    const t = text.toLowerCase();
    const objective = document.getElementById("objectiveType").value;

    const changes = {
      trust: 0,
      defensiveness: 0,
      openness: 0,
      appointmentReadiness: 0,
      objectiveProgress: 0
    };

    const hasOpenQuestion = t.includes("what") || t.includes("how") || t.includes("why") || t.includes("tell me") || t.includes("walk me through");
    const hasValidation = t.includes("i understand") || t.includes("that makes sense") || t.includes("i can see") || t.includes("sounds like") || t.includes("i hear you");
    const tooPushy = t.includes("can i come over") || t.includes("let's set an appointment") || t.includes("when can we meet") || t.includes("are you ready to list") || t.includes("sign");
    const genericAgentTalk = t.includes("market analysis") || t.includes("i'd love the opportunity") || t.includes("top agent") || t.includes("i can help sell your home");
    const curiosity = t.includes("what happened") || t.includes("what was frustrating") || t.includes("what went wrong") || t.includes("what are you hoping") || t.includes("what's your plan");

    if (hasOpenQuestion) {
      changes.trust += 1;
      changes.openness += 1;
      changes.objectiveProgress += 6;
    }

    if (hasValidation) {
      changes.trust += 1;
      changes.defensiveness -= 1;
      changes.objectiveProgress += 5;
    }

    if (curiosity) {
      changes.trust += 1;
      changes.openness += 1;
      changes.objectiveProgress += 8;
    }

    if (tooPushy) {
      changes.defensiveness += 2;
      changes.trust -= 1;
      changes.appointmentReadiness -= 2;
      changes.objectiveProgress -= 8;
    }

    if (genericAgentTalk) {
      changes.defensiveness += 1;
      changes.trust -= 1;
      changes.objectiveProgress -= 5;
    }

    if (objective === "Set Appointment" && (t.includes("meet") || t.includes("appointment"))) {
      changes.objectiveProgress += 10;
      if (liveState.trust >= 5) changes.appointmentReadiness += 1;
    }

    if (objective === "Build Rapport" && (hasValidation || curiosity)) changes.objectiveProgress += 6;
    if (objective === "Handle Objection" && (t.includes("understand") || t.includes("fair") || t.includes("makes sense"))) changes.objectiveProgress += 7;
    if (objective === "Uncover Motivation" && hasOpenQuestion) changes.objectiveProgress += 8;

    applyStateChange(changes);
  }

  function analyzeSellerTurn(text) {
    const t = text.toLowerCase();

    const changes = {
      trust: 0,
      defensiveness: 0,
      openness: 0,
      appointmentReadiness: 0,
      objectiveProgress: 0
    };

    const wordCount = t.split(/\s+/).filter(Boolean).length;

    if (wordCount >= 14) {
      changes.openness += 1;
      changes.trust += 1;
      changes.objectiveProgress += 6;
    } else if (wordCount <= 4) {
      changes.defensiveness += 1;
    }

    const resistantPhrases = [
      "not interested", "we're going to wait", "same agent", "not paying commission",
      "not in a rush", "not right now", "we're fine", "call me later"
    ];

    const openPhrases = [
      "honestly", "the problem was", "what happened was", "we were thinking",
      "we might", "i've been considering", "frustrating"
    ];

    if (resistantPhrases.some((p) => t.includes(p))) {
      changes.defensiveness += 1;
      changes.appointmentReadiness -= 1;
      changes.objectiveProgress -= 4;
    }

    if (openPhrases.some((p) => t.includes(p))) {
      changes.openness += 1;
      changes.trust += 1;
      changes.objectiveProgress += 8;
    }

    if (t.includes("maybe") || t.includes("possibly") || t.includes("we'll see")) {
      changes.appointmentReadiness += 1;
    }

    applyStateChange(changes);
  }

  function showReview() {
    if (!currentScenario) return;

    reviewSection.classList.add("show");

    const scorecards = [
      ["Opening", `${clamp(Math.round((liveState.trust + (10 - liveState.defensiveness)) / 2), 1, 10)}/10`],
      ["Rapport", `${liveState.trust}/10`],
      ["Control", `${clamp(10 - Math.abs(liveState.defensiveness - 5), 1, 10)}/10`],
      ["Question Quality", `${clamp(liveState.openness, 1, 10)}/10`],
      ["Objection Handling", `${clamp(10 - liveState.defensiveness + 2, 1, 10)}/10`],
      ["Objective Execution", `${Math.max(1, Math.round(liveState.objectiveProgress / 10))}/10`],
      ["Appointment Positioning", `${liveState.appointmentReadiness}/10`]
    ];

    document.getElementById("scorecards").innerHTML = scorecards
      .map((pair) => "<div>" + pair[0] + ": <strong>" + pair[1] + "</strong></div>")
      .join("");

    document.getElementById("blindReveal").innerHTML =
      "Seller: <strong>" + sellerName + "</strong><br>" +
      "Lead Type: <strong>" + currentScenario.leadType + "</strong><br>" +
      "Objective: <strong>" + currentScenario.objective + "</strong><br>" +
      "DISC: <strong>" + currentScenario.disc + "</strong><br>" +
      "Frustration: <strong>" + currentScenario.frustration + "</strong><br>" +
      "Motivation: <strong>" + currentScenario.motivation + "</strong><br>" +
      "Mood: <strong>" + currentScenario.mood + "</strong>";

    document.getElementById("stateChanges").innerHTML =
      "Trust: <strong>" + liveState.startTrust + " → " + liveState.trust + "</strong><br>" +
      "Defensiveness: <strong>" + liveState.startDefensiveness + " → " + liveState.defensiveness + "</strong><br>" +
      "Openness: <strong>" + liveState.startOpenness + " → " + liveState.openness + "</strong><br>" +
      "Appointment Readiness: <strong>" + liveState.startAppointmentReadiness + " → " + liveState.appointmentReadiness + "</strong><br>" +
      "Objective Progress: <strong>" + liveState.objectiveProgress + "%</strong>";
  }

  function setButtonsState(isStartingOrLive) {
    document.getElementById("startBtn").disabled = isStartingOrLive;
    document.getElementById("endBtn").disabled = !isStartingOrLive;
    document.getElementById("pauseBtn").disabled = !isStartingOrLive;
    document.getElementById("coachBtn").disabled = !isStartingOrLive;
    document.getElementById("resumeBtn").disabled = !isStartingOrLive;
    document.getElementById("scoreBtn").disabled = !isStartingOrLive;
  }

  function disableLocalMic(disabled) {
    if (!localStream) return;
    localStream.getAudioTracks().forEach((track) => {
      track.enabled = !disabled;
    });
  }

  async function playRingtoneOnce() {
    try {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }

      const ctx = audioContext;
      const durationMs = 2200;
      const start = ctx.currentTime;

      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, start);
      master.connect(ctx.destination);

      function addRingBurst(offsetSeconds, burstDurationSeconds) {
        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();

        osc1.type = "sine";
        osc2.type = "sine";
        osc1.frequency.setValueAtTime(440, start + offsetSeconds);
        osc2.frequency.setValueAtTime(480, start + offsetSeconds);

        gain.gain.setValueAtTime(0.0001, start + offsetSeconds);
        gain.gain.exponentialRampToValueAtTime(0.08, start + offsetSeconds + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.06, start + offsetSeconds + burstDurationSeconds - 0.08);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + offsetSeconds + burstDurationSeconds);

        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(master);

        osc1.start(start + offsetSeconds);
        osc2.start(start + offsetSeconds);
        osc1.stop(start + offsetSeconds + burstDurationSeconds);
        osc2.stop(start + offsetSeconds + burstDurationSeconds);
      }

      addRingBurst(0.00, 0.45);
      addRingBurst(0.60, 0.45);
      addRingBurst(1.35, 0.45);

      return new Promise((resolve) => setTimeout(resolve, durationMs));
    } catch (err) {
      console.error("Ringtone failed:", err);
      return wait(1800);
    }
  }

  async function cleanupConnection() {
    try {
      if (dc) {
        try { dc.close(); } catch (err) {}
        dc = null;
      }

      if (pc) {
        try { pc.close(); } catch (err) {}
        pc = null;
      }

      if (localStream) {
        localStream.getTracks().forEach((track) => track.stop());
        localStream = null;
      }

      remoteAudio.pause();
      remoteAudio.srcObject = null;
    } catch (err) {
      console.error("Cleanup error:", err);
    }

    sessionLive = false;
    sessionStarting = false;
    sellerHasSpokenFirst = false;
    awaitingSellerOpening = false;
    callState = CALL_STATES.IDLE;
  }

  async function createRealtimeConnection(ephemeralKey) {
    pc = new RTCPeerConnection();

    const dataChannelOpenPromise = new Promise((resolve, reject) => {
      let settled = false;

      function doneResolve() {
        if (settled) return;
        settled = true;
        resolve();
      }

      function doneReject(err) {
        if (settled) return;
        settled = true;
        reject(err);
      }

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === "failed") {
          doneReject(new Error("Peer connection failed."));
        }
      };

      pc.ontrack = (event) => {
        remoteAudio.srcObject = event.streams[0];
        remoteAudio.play().catch((err) => {
          console.error("Remote audio play failed:", err);
          addLine("coach", "Audio playback was blocked by the browser.");
        });
      };

      dc = pc.createDataChannel("oai-events");

      dc.onopen = () => {
        addLine("system", "Realtime voice connected.");
        doneResolve();
      };

      dc.onmessage = (event) => {
        handleRealtimeMessage(event);
      };

      dc.onerror = (err) => {
        console.error("Data channel error:", err);
      };

      dc.onclose = () => {
        if (sessionLive) {
          addLine("system", "Realtime channel closed.");
        }
      };
    });

    localStream.getTracks().forEach((track) => {
      pc.addTrack(track, localStream);
    });

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const sdpResp = await fetch("https://api.openai.com/v1/realtime/calls", {
      method: "POST",
      body: offer.sdp,
      headers: {
        Authorization: "Bearer " + ephemeralKey,
        "Content-Type": "application/sdp"
      }
    });

    if (!sdpResp.ok) {
      const text = await sdpResp.text();
      throw new Error("Realtime SDP handshake failed: " + text);
    }

    const answerSdp = await sdpResp.text();

    await pc.setRemoteDescription({
      type: "answer",
      sdp: answerSdp
    });

    await dataChannelOpenPromise;
  }

  function handleRealtimeMessage(event) {
    try {
      const msg = JSON.parse(event.data);

      if (msg.type === "response.audio_transcript.done" && msg.transcript) {
        addLine("ai", sellerName + ": " + msg.transcript);
        analyzeSellerTurn(msg.transcript);

        if (awaitingSellerOpening && !sellerHasSpokenFirst) {
          awaitingSellerOpening = false;
          sellerHasSpokenFirst = true;
          callState = CALL_STATES.USER_TURN;
          disableLocalMic(false);
          setStatus("live", "Your turn");
          addLine("system", sellerName + " answered first. Your mic is now live.");
        }
      }

      if (msg.type === "conversation.item.input_audio_transcription.completed" && msg.transcript) {
        if (!sellerHasSpokenFirst) return;

        addLine("user", "You: " + msg.transcript);
        analyzeUserTurn(msg.transcript);

        const lower = msg.transcript.toLowerCase();
        if (lower.includes("saber score") || lower.includes("saber end")) {
          showReview();
        }
      }

      if (msg.type === "error") {
        console.error("Realtime error payload:", msg);
        addLine("coach", "Realtime error: " + JSON.stringify(msg.error || msg));
      }
    } catch (err) {
      console.error("Data channel parse error:", err);
    }
  }

  function triggerSellerOpeningLine() {
    if (!dc || dc.readyState !== "open") {
      throw new Error("Data channel is not open.");
    }

    awaitingSellerOpening = true;
    callState = CALL_STATES.SELLER_TURN;
    setStatus("live", sellerName + " is answering...");

    dc.send(JSON.stringify({
      type: "response.create",
      response: {
        instructions:
          'PHONE_ANSWER_NOW. Answer the phone right now. Your first spoken line must be exactly "' +
          phoneAnswer.replace(/"/g, '\\"') +
          '". After that, continue naturally as the seller and keep it brief.'
      }
    }));
  }

  async function startSession() {
    if (sessionLive || sessionStarting) return;

    sessionStarting = true;
    callState = CALL_STATES.STARTING;
    sellerHasSpokenFirst = false;
    awaitingSellerOpening = false;
    reviewSection.classList.remove("show");
    resetTranscript();
    buildLocalScenario();
    setButtonsState(true);
    setStatus("live", "Dialing...");

    const backendUrl = document.getElementById("backendUrl").value.trim();
    const payload = {
      leadType: document.getElementById("leadType").value,
      difficulty: document.getElementById("difficulty").value,
      mode: document.getElementById("mode").value,
      objective: document.getElementById("objectiveType").value,
      voice: document.getElementById("voiceType").value
    };

    try {
      addLine("system", "Dialing...");
      callState = CALL_STATES.RINGING;

      const ringPromise = playRingtoneOnce();

      const micPromise = navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });

      const sessionPromise = fetch(backendUrl + "/session", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      localStream = await micPromise;
      disableLocalMic(true);

      const sessionResp = await sessionPromise;
      const sessionData = await sessionResp.json();

      if (!sessionResp.ok) {
        console.error(sessionData);
        throw new Error("Failed to create realtime session: " + JSON.stringify(sessionData));
      }

      sellerName = sessionData.sellerName || "Seller";
      phoneAnswer = sessionData.phoneAnswer || "Hello?";
      document.getElementById("liveSellerName").textContent = sellerName;

      const ephemeralKey = sessionData.value || sessionData.client_secret?.value || null;
      if (!ephemeralKey) {
        throw new Error("No client secret returned from backend.");
      }

      callState = CALL_STATES.CONNECTING;
      setStatus("live", "Connecting...");
      addLine("system", "Connecting the call...");

      await createRealtimeConnection(ephemeralKey);
      await ringPromise;

      callState = CALL_STATES.READY_TO_ANSWER;
      addLine("system", sellerName + " picked up.");
      await wait(250);

      sessionLive = true;
      sessionStarting = false;

      triggerSellerOpeningLine();
    } catch (err) {
      console.error(err);
      setStatus("failed", "Failed");
      addLine("coach", err.message || "Could not start realtime session.");
      await cleanupConnection();
      setButtonsState(false);
    }
  }

  async function endSession() {
    await cleanupConnection();
    setStatus("idle", "Idle");
    setButtonsState(false);
    addLine("system", "Session ended.");
    showReview();
  }

  function sendCommand(text) {
    if (!dc || dc.readyState !== "open") {
      addLine("coach", "No live realtime channel.");
      return;
    }

    dc.send(JSON.stringify({
      type: "conversation.item.create",
      item: {
        type: "message",
        role: "user",
        content: [
          {
            type: "input_text",
            text
          }
        ]
      }
    }));

    dc.send(JSON.stringify({
      type: "response.create",
      response: {}
    }));

    addLine("user", "You: [command] " + text);
  }

  document.getElementById("startBtn").addEventListener("click", startSession);
  document.getElementById("endBtn").addEventListener("click", endSession);
  document.getElementById("pauseBtn").addEventListener("click", function() { sendCommand("Saber pause"); });
  document.getElementById("coachBtn").addEventListener("click", function() { sendCommand("Saber coach"); });
  document.getElementById("resumeBtn").addEventListener("click", function() { sendCommand("Saber resume"); });
  document.getElementById("scoreBtn").addEventListener("click", function() { sendCommand("Saber score"); });

  document.getElementById("replayBtn").addEventListener("click", function() {
    addLine("system", "Replay selected.");
    reviewSection.classList.remove("show");
    setStatus("idle", "Idle");
  });

  document.getElementById("newBtn").addEventListener("click", function() {
    addLine("system", "New seller selected.");
    reviewSection.classList.remove("show");
    buildLocalScenario();
    setStatus("idle", "Idle");
  });

  setButtonsState(false);
  updateLivePanel();
</script>
